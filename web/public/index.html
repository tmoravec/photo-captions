<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photo Captions</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    #drop-zone {
      border: 2px dashed var(--bs-border-color);
      transition: background-color 0.15s, border-color 0.15s;
      min-height: 120px;
      cursor: pointer;
    }
    #drop-zone.drag-over {
      background-color: var(--bs-secondary-bg);
      border-color: var(--bs-primary);
    }
    .thumb {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
    }
    .tag-chip {
      cursor: pointer;
      user-select: none;
    }
    .tag-chip:hover {
      opacity: 0.8;
    }
    #auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 1050;
      background: var(--bs-body-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #auth-overlay.d-none {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Password overlay -->
  <div id="auth-overlay">
    <div class="card" style="width: min(90vw, 360px);">
      <div class="card-body p-4">
        <h5 class="card-title mb-3">Photo Captions</h5>
        <p class="text-secondary small mb-3">Enter the app password to continue.</p>
        <div class="mb-3">
          <input
            type="password"
            id="password-input"
            class="form-control"
            placeholder="Password"
            autocomplete="current-password"
          />
        </div>
        <div id="auth-error" class="text-danger small mb-2 d-none">Incorrect password.</div>
        <button id="auth-submit" class="btn btn-primary w-100">Continue</button>
      </div>
    </div>
  </div>

  <!-- Main UI -->
  <main class="container py-4" style="max-width: 720px;">
    <h1 class="h4 mb-4">Photo Captions</h1>

    <!-- Platform selector -->
    <div class="mb-3">
      <label for="platform" class="form-label">Platform</label>
      <select id="platform" class="form-select">
        <option value="flickr">Flickr</option>
        <option value="instagram">Instagram</option>
        <option value="reddit">Reddit</option>
      </select>
    </div>

    <!-- Context textarea -->
    <div class="mb-3">
      <label for="context" class="form-label">Session context</label>
      <textarea
        id="context"
        class="form-control"
        rows="4"
        placeholder="Describe the photo session: location, gear, mood, weather…"
      ></textarea>
    </div>

    <!-- Drop zone -->
    <div id="drop-zone" class="rounded p-4 text-center mb-3">
      <p class="mb-1">Drop images here or
        <label for="file-input" class="text-primary" style="cursor:pointer; text-decoration:underline;">browse</label>
      </p>
      <p class="text-secondary small mb-0">JPEG or PNG</p>
      <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/jpg" class="d-none" />
    </div>

    <!-- File list -->
    <ul id="file-list" class="list-group mb-3"></ul>

    <button id="submit-btn" class="btn btn-primary w-100" disabled>Generate captions</button>
  </main>

  <!-- Results area -->
  <section id="results" class="container pb-5" style="max-width: 720px;"></section>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmEzOCrT3OW2MiNGf9OKqnO7JIP"
    crossorigin="anonymous"
  ></script>
  <script src="app.js"></script>
</body>
</html>
